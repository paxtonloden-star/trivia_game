<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Game Host</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; background:#08111f; color:#fff; margin:0; padding:24px; }
    .wrap { max-width: 1200px; margin: 0 auto; display:grid; gap:16px; }
    .card { background:#111b2b; border:1px solid #263a55; border-radius:16px; padding:20px; box-shadow:0 12px 28px rgba(0,0,0,.22); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:12px; }
    input, textarea, select, button { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #355074; background:#0d1625; color:#fff; padding:12px; font:inherit; }
    textarea { min-height: 110px; }
    button { cursor:pointer; background:#1c3250; font-weight:700; }
    button.primary { background:#d98600; color:#111; border-color:#ffb84d; }
    button.warn { background:#5a1f1f; border-color:#8f3a3a; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; }
    .actions button { width:auto; min-width:150px; }
    .pill { display:inline-block; padding:8px 12px; border-radius:999px; background:#1a2a41; margin-right:8px; }
    .muted { color:#b7c8df; font-size:14px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #21324c; }
    h1, h2, h3 { margin-top:0; }
    .join-url { word-break:break-all; }
    .queue-list { margin:0; padding-left:18px; }
    .queue-list li { margin:6px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Trivia Game — Host</h1>
      <div class="grid">
        <div><div class="pill">Join code <strong id="joinCode">------</strong></div></div>
        <div><div class="pill">State <strong id="gameState">idle</strong></div></div>
        <div><div class="pill">Round <strong id="roundNumber">0</strong></div></div>
        <div><div class="pill">Queue <strong id="queueCount">0</strong></div></div>
      </div>
      <p class="join-url muted" id="joinUrl"></p>
      <p class="muted" id="notice"></p>
    </div>

    <div class="card">
      <h2>Room settings</h2>
      <div class="grid">
        <label>Answer seconds<input id="answerSeconds" type="number" min="3" max="120" value="20"></label>
        <label>Reveal seconds<input id="revealSeconds" type="number" min="1" max="60" value="5"></label>
        <label>Auto next<select id="autoNext"><option value="true">On</option><option value="false">Off</option></select></label>
      </div>
      <div class="actions" style="margin-top:12px;"><button id="saveSettings" class="primary">Save settings</button></div>
    </div>

    <div class="card">
      <h2>TTS & speakers</h2>
      <div class="grid">
        <label>TTS enabled<select id="ttsEnabled"><option value="true">On</option><option value="false">Off</option></select></label>
        <label>TTS provider<select id="ttsProvider"></select></label>
        <label>Speaker targets<select id="speakerTargets" multiple size="5"></select></label>
        <label>Language<input id="ttsLanguage" type="text" placeholder="en-US"></label>
        <label>Voice<input id="ttsVoice" type="text" placeholder="optional voice name"></label>
        <label>Speech rate WPM<input id="ttsRate" type="number" min="80" max="260" value="155"></label>
        <label>Announce question<select id="announceQuestion"><option value="true">Yes</option><option value="false">No</option></select></label>
        <label>Announce result<select id="announceResult"><option value="true">Yes</option><option value="false">No</option></select></label>
        <label>Start timer after TTS<select id="startAfterTts"><option value="true">Yes</option><option value="false">No</option></select></label>
      </div>
      <div class="actions" style="margin-top:12px;"><button id="saveTts">Save TTS settings</button></div>
    </div>

    <div class="card">
      <h2>Question editor</h2>
      <div class="grid">
        <label style="grid-column:1 / -1;">Question<textarea id="questionText" placeholder="Enter the trivia question..."></textarea></label>
        <label>Choice A<input id="choice0" type="text"></label>
        <label>Choice B<input id="choice1" type="text"></label>
        <label>Choice C<input id="choice2" type="text"></label>
        <label>Choice D<input id="choice3" type="text"></label>
        <label>Correct answer<select id="correctIndex"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></label>
        <label>Category<input id="category" type="text" placeholder="science, movies, sports..."></label>
        <label style="grid-column:1 / -1;">Explanation<textarea id="explanation" placeholder="Optional explanation shown after the round..."></textarea></label>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button id="saveQuestion">Save as current</button>
        <button id="queueQuestion">Add to queue</button>
        <button id="startRound" class="primary">Start round</button>
        <button id="nextQuestion">Next queued question</button>
        <button id="gradeNow">Reveal now</button>
        <button id="clearRound">Clear round</button>
      </div>
    </div>

    <div class="card">
      <h2>Pack import</h2>
      <p class="muted">Paste a JSON pack with <code>name</code>, optional <code>description</code>, and a <code>questions</code> array.</p>
      <textarea id="packJson" placeholder='{"name":"Space Pack","questions":[{"question":"...","choices":["A","B"],"correct_index":0}]}'></textarea>
      <div class="actions" style="margin-top:12px;">
        <button id="importPack">Import pack</button>
      </div>
      <div class="grid" style="margin-top:16px;">
        <label>Available packs<select id="packSelect"></select></label>
        <label>Questions to queue<input id="packCount" type="number" min="1" value="10"></label>
        <label>Replace queue<select id="replaceQueue"><option value="false">Append</option><option value="true">Replace queue</option></select></label>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button id="loadPackToQueue">Load pack into queue</button>
      </div>
    </div>

    <div class="card">
      <h2>Queued questions</h2>
      <ol id="queueList" class="queue-list"></ol>
    </div>

    <div class="card">
      <h2>Players</h2>
      <table>
        <thead><tr><th>Name</th><th>Score</th><th>Answered</th><th></th></tr></thead>
        <tbody id="playersBody"></tbody>
      </table>
      <div class="actions" style="margin-top:12px;"><button id="resetScores" class="warn">Reset scores</button></div>
    </div>

    <div class="card">
      <h2>Last result</h2>
      <div id="lastResult" class="muted">No results yet.</div>
    </div>
  </div>

  <script>
    const stateUrl = '/api/trivia_game/state';
    const bootstrapUrl = '/api/trivia_game/bootstrap';
    const hostActionUrl = '/api/trivia_game/host_action';
    let latestState = null;
    let socket = null;
    let suspendRenderUntil = 0;

    function setNotice(message) {
      document.getElementById('notice').textContent = message || '';
    }

    function suspendRender(ms = 2000) {
      suspendRenderUntil = Date.now() + ms;
    }

    function shouldSkipElementUpdate(el) {
      if (!el) return true;
      if (Date.now() < suspendRenderUntil) {
        const active = document.activeElement;
        if (active === el) return true;
        if (el.tagName === 'TEXTAREA') return true;
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT') return true;
      }
      return document.activeElement === el;
    }

    function safeSetValue(id, value) {
      const el = document.getElementById(id);
      if (!el || shouldSkipElementUpdate(el)) return;
      el.value = value ?? '';
    }

    async function fetchState() {
      const response = await fetch(stateUrl, { cache: 'no-store' });
      const payload = await response.json();
      render(payload.state);
    }

    async function fetchBootstrap() {
      const response = await fetch(bootstrapUrl, { cache: 'no-store' });
      return response.json();
    }

    async function hostAction(action, extra = {}) {
      setNotice('Working...');
      suspendRender(2500);
      const response = await fetch(hostActionUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...extra }),
      });
      if (!response.ok) {
        throw new Error(await response.text() || 'Host action failed');
      }
      const payload = await response.json();
      render(payload.state);
      await refreshAudioControls();
      setNotice('Saved.');
      window.setTimeout(() => setNotice(''), 1500);
    }

    function fillSelect(select, items, selected, placeholder) {
      const isFocused = document.activeElement === select;
      const currentValue = select.value;
      if (Date.now() < suspendRenderUntil && isFocused) return;
      select.innerHTML = '';
      const blank = document.createElement('option');
      blank.value = '';
      blank.textContent = placeholder;
      select.appendChild(blank);
      for (const item of items || []) {
        const option = document.createElement('option');
        option.value = item.entity_id || item.value || '';
        option.textContent = item.name || item.label || item.entity_id || item.value || '';
        select.appendChild(option);
      }
      select.value = selected || currentValue || '';
    }

    function fillMultiSelect(select, items, selectedValues) {
      if (Date.now() < suspendRenderUntil && document.activeElement === select) return;
      const selected = new Set(selectedValues || []);
      select.innerHTML = '';
      for (const item of items || []) {
        const option = document.createElement('option');
        option.value = item.entity_id || '';
        option.textContent = item.name || item.entity_id || '';
        option.selected = selected.has(option.value);
        select.appendChild(option);
      }
    }

    async function refreshAudioControls() {
      const payload = await fetchBootstrap();
      const state = payload.state || latestState || {};
      const tts = state.tts || {};
      fillSelect(document.getElementById('ttsProvider'), payload.tts_providers || [], tts.provider_entity || '', 'Choose provider...');
      fillMultiSelect(document.getElementById('speakerTargets'), payload.speaker_targets || [], tts.speaker_targets || []);
      safeSetValue('ttsEnabled', String(Boolean(tts.enabled)));
      safeSetValue('ttsLanguage', tts.language || 'en-US');
      safeSetValue('ttsVoice', tts.voice || '');
      safeSetValue('ttsRate', tts.speech_rate_wpm ?? 155);
      safeSetValue('announceQuestion', String(tts.announce_question !== false));
      safeSetValue('announceResult', String(tts.announce_result !== false));
      safeSetValue('startAfterTts', String(tts.start_timer_after_tts !== false));
    }

    function renderPackOptions(state) {
      const select = document.getElementById('packSelect');
      if (Date.now() < suspendRenderUntil && document.activeElement === select) return;
      const packs = Array.isArray(state.custom_packs) ? state.custom_packs : [];
      const current = select.value;
      select.innerHTML = '';
      const blank = document.createElement('option');
      blank.value = '';
      blank.textContent = packs.length ? 'Choose a pack...' : 'No packs imported';
      select.appendChild(blank);
      for (const pack of packs) {
        const option = document.createElement('option');
        option.value = pack.slug || '';
        option.textContent = `${pack.name || pack.slug} (${pack.question_count || 0})`;
        select.appendChild(option);
      }
      if (packs.some((pack) => pack.slug === current)) select.value = current;
    }

    function renderQueue(state) {
      const queueList = document.getElementById('queueList');
      queueList.innerHTML = '';
      const queue = Array.isArray(state.question_queue) ? state.question_queue : [];
      if (!queue.length) {
        const li = document.createElement('li');
        li.textContent = 'No queued questions.';
        queueList.appendChild(li);
        return;
      }
      for (const item of queue) {
        const li = document.createElement('li');
        li.textContent = `${item.question || 'Untitled question'}${item.category ? ` — ${item.category}` : ''}`;
        queueList.appendChild(li);
      }
    }

    function render(state) {
      latestState = state;
      document.getElementById('joinCode').textContent = state.join_code || '------';
      document.getElementById('gameState').textContent = state.state || 'idle';
      document.getElementById('roundNumber').textContent = String(state.round_number || 0);
      document.getElementById('queueCount').textContent = String(state.queue_count || 0);
      document.getElementById('joinUrl').textContent = state.join_url || '';
      safeSetValue('answerSeconds', state.answer_seconds ?? 20);
      safeSetValue('revealSeconds', state.reveal_seconds ?? 5);
      safeSetValue('autoNext', String(Boolean(state.auto_next)));

      const q = state.question || {};
      safeSetValue('questionText', q.question || '');
      const choices = Array.isArray(q.choices) ? q.choices : [];
      for (let i = 0; i < 4; i += 1) safeSetValue(`choice${i}`, choices[i] || '');
      safeSetValue('correctIndex', String(q.correct_index ?? 0));
      safeSetValue('category', q.category || '');
      safeSetValue('explanation', q.explanation || '');

      renderPackOptions(state);
      renderQueue(state);

      const tbody = document.getElementById('playersBody');
      tbody.innerHTML = '';
      const answered = state.current_answers || {};
      for (const player of (state.players || [])) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${player.name || ''}</td><td>${player.score ?? 0}</td><td>${answered[player.name] !== undefined ? 'Yes' : 'No'}</td><td><button data-remove="${player.name || ''}">Remove</button></td>`;
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll('button[data-remove]').forEach((button) => {
        button.addEventListener('click', async () => {
          try { await hostAction('remove_player', { name: button.dataset.remove }); } catch (err) { setNotice(err.message); }
        });
      });

      const result = state.last_result || {};
      const correct = Array.isArray(result.correct_players) ? result.correct_players : [];
      document.getElementById('lastResult').textContent = result.correct_answer
        ? `Correct answer: ${result.correct_answer}. ${correct.length ? `Winners: ${correct.join(', ')}.` : 'Nobody got it right.'} ${result.explanation || ''}`.trim()
        : 'No results yet.';
    }

    function connectSocket() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      socket = new WebSocket(`${protocol}://${location.host}/api/trivia_game/ws`);
      socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.event === 'state') render(payload.state);
      };
      socket.onclose = () => window.setTimeout(connectSocket, 1500);
    }

    function currentQuestionPayload() {
      return {
        question: document.getElementById('questionText').value,
        choices: [0,1,2,3].map((idx) => document.getElementById(`choice${idx}`).value),
        correct_index: parseInt(document.getElementById('correctIndex').value || '0', 10),
        category: document.getElementById('category').value,
        explanation: document.getElementById('explanation').value,
      };
    }

    document.addEventListener('input', () => suspendRender(1800), true);
    document.addEventListener('focusin', () => suspendRender(1800), true);

    document.getElementById('saveSettings').addEventListener('click', async () => {
      try {
        await hostAction('set_settings', {
          answer_seconds: parseInt(document.getElementById('answerSeconds').value || '20', 10),
          reveal_seconds: parseInt(document.getElementById('revealSeconds').value || '5', 10),
          auto_next: document.getElementById('autoNext').value === 'true',
        });
      } catch (err) { setNotice(err.message); }
    });

    document.getElementById('saveTts').addEventListener('click', async () => {
      try {
        const selectedSpeakers = Array.from(document.getElementById('speakerTargets').selectedOptions).map((option) => option.value);
        await hostAction('set_tts_settings', {
          enabled: document.getElementById('ttsEnabled').value === 'true',
          provider_entity: document.getElementById('ttsProvider').value,
          speaker_targets: selectedSpeakers,
          language: document.getElementById('ttsLanguage').value,
          voice: document.getElementById('ttsVoice').value,
          announce_question: document.getElementById('announceQuestion').value === 'true',
          announce_result: document.getElementById('announceResult').value === 'true',
          start_timer_after_tts: document.getElementById('startAfterTts').value === 'true',
          speech_rate_wpm: parseInt(document.getElementById('ttsRate').value || '155', 10),
        });
      } catch (err) { setNotice(err.message); }
    });

    document.getElementById('saveQuestion').addEventListener('click', async () => {
      try { await hostAction('set_question', currentQuestionPayload()); } catch (err) { setNotice(err.message); }
    });

    document.getElementById('queueQuestion').addEventListener('click', async () => {
      try { await hostAction('queue_question', currentQuestionPayload()); } catch (err) { setNotice(err.message); }
    });

    document.getElementById('importPack').addEventListener('click', async () => {
      try {
        const payload = JSON.parse(document.getElementById('packJson').value || '{}');
        await hostAction('import_pack', payload);
      } catch (err) { setNotice(err.message); }
    });

    document.getElementById('loadPackToQueue').addEventListener('click', async () => {
      try {
        await hostAction('load_pack_to_queue', {
          slug: document.getElementById('packSelect').value,
          count: parseInt(document.getElementById('packCount').value || '10', 10),
          replace_queue: document.getElementById('replaceQueue').value === 'true',
        });
      } catch (err) { setNotice(err.message); }
    });

    document.getElementById('startRound').addEventListener('click', async () => {
      try { await hostAction('start_round'); } catch (err) { setNotice(err.message); }
    });
    document.getElementById('nextQuestion').addEventListener('click', async () => {
      try { await hostAction('next_question'); } catch (err) { setNotice(err.message); }
    });
    document.getElementById('gradeNow').addEventListener('click', async () => {
      try { await hostAction('grade_round'); } catch (err) { setNotice(err.message); }
    });
    document.getElementById('clearRound').addEventListener('click', async () => {
      try { await hostAction('clear_round'); } catch (err) { setNotice(err.message); }
    });
    document.getElementById('resetScores').addEventListener('click', async () => {
      try { await hostAction('reset_scores'); } catch (err) { setNotice(err.message); }
    });

    fetchState().then(refreshAudioControls).catch((err) => setNotice(err.message));
    connectSocket();
    setInterval(() => { if (socket && socket.readyState === WebSocket.OPEN) socket.send('ping'); }, 15000);
  </script>
</body>
</html>
