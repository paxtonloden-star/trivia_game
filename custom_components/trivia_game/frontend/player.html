<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Game Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,200,60,.18), transparent 30%),
        linear-gradient(180deg, #0a1638 0%, #071024 100%);
      color: #fff;
      display: grid;
      place-items: center;
    }
    .board {
      width: min(1100px, 94vw);
      border-radius: 28px;
      border: 4px solid rgba(255,191,0,.55);
      background:
        radial-gradient(circle at top center, rgba(255,231,170,.22), transparent 22%),
        linear-gradient(180deg, rgba(27,17,9,.96) 0%, rgba(9,10,22,.98) 100%);
      box-shadow: 0 0 35px rgba(255,166,0,.18), 0 22px 50px rgba(0,0,0,.42);
      padding: 24px;
    }
    h1 { text-align:center; color:#ffd76d; font-size: clamp(32px, 6vw, 70px); margin:0 0 20px; text-transform:uppercase; }
    .question {
      background: linear-gradient(180deg, #f7e6bf 0%, #f3dba9 100%);
      color:#16181f;
      border-radius: 22px;
      padding: 24px;
      font-size: clamp(26px, 4vw, 54px);
      font-weight: 900;
      text-align:center;
      margin-bottom: 18px;
    }
    .answers {
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 16px;
    }
    .answer {
      min-height: 110px;
      border-radius: 28px;
      border: 3px solid rgba(255,184,0,.48);
      background: linear-gradient(180deg, rgba(15,18,31,.98), rgba(4,5,12,.98));
      color:#fff;
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px 20px;
      font-size: clamp(20px, 2.6vw, 40px);
      font-weight: 900;
    }
    .badge {
      width:66px; height:66px; border-radius:999px; display:grid; place-items:center;
      background: radial-gradient(circle at 35% 30%, #ffbe5c, #ff7a00 56%, #ac2f00 100%);
      border: 3px solid rgba(255,214,95,.88);
    }
  </style>
</head>
<body>
  <div class="board">
    <h1>Trivia Mode</h1>
    <div class="question">Question goes here</div>
    <div class="answers">
      <div class="answer"><div class="badge">A</div><div>Answer A</div></div>
      <div class="answer"><div class="badge">B</div><div>Answer B</div></div>
      <div class="answer"><div class="badge">C</div><div>Answer C</div></div>
      <div class="answer"><div class="badge">D</div><div>Answer D</div></div>
    </div>
  </div>
</body>
</html>
