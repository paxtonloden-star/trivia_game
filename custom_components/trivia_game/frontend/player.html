<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Game Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,200,60,.18), transparent 30%),
        linear-gradient(180deg, #0a1638 0%, #071024 100%);
      color: #fff;
      display: grid;
      place-items: center;
      padding: 18px;
      box-sizing: border-box;
    }
    .board {
      width: min(1100px, 94vw);
      border-radius: 28px;
      border: 4px solid rgba(255,191,0,.55);
      background:
        radial-gradient(circle at top center, rgba(255,231,170,.22), transparent 22%),
        linear-gradient(180deg, rgba(27,17,9,.96) 0%, rgba(9,10,22,.98) 100%);
      box-shadow: 0 0 35px rgba(255,166,0,.18), 0 22px 50px rgba(0,0,0,.42);
      padding: 24px;
    }
    h1 { text-align:center; color:#ffd76d; font-size: clamp(32px, 6vw, 70px); margin:0 0 20px; text-transform:uppercase; }
    .topbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .player-pill { display:flex; align-items:center; gap:12px; padding:8px 14px; border-radius:999px; background:#1a2a41; font-weight:700; }
    .avatar {
      width:56px; height:56px; border-radius:999px; overflow:hidden; background:linear-gradient(180deg,#ffb84d,#d96e00);
      display:grid; place-items:center; color:#111; font-size:20px; font-weight:900; flex:0 0 auto;
      border:2px solid rgba(255,214,95,.88);
    }
    .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .pill { display:inline-flex; gap:8px; align-items:center; padding:10px 14px; border-radius:999px; background:#1a2a41; font-weight:700; }
    .question {
      background: linear-gradient(180deg, #f7e6bf 0%, #f3dba9 100%);
      color:#16181f;
      border-radius: 22px;
      padding: 24px;
      font-size: clamp(26px, 4vw, 54px);
      font-weight: 900;
      text-align:center;
      margin-bottom: 12px;
    }
    .reveal {
      margin-bottom: 18px;
      padding: 18px 22px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,225,140,.22), rgba(255,180,0,.12));
      border: 2px solid rgba(255,210,110,.45);
      text-align:center;
    }
    .reveal-title {
      text-transform: uppercase;
      letter-spacing: .1em;
      color:#ffe49b;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .reveal-answer {
      font-size: clamp(26px, 3.4vw, 46px);
      font-weight: 900;
      color:#fff5cf;
      margin-bottom: 8px;
    }
    .reveal-explanation {
      font-size: clamp(16px, 2vw, 24px);
      color:#f0f5ff;
    }
    .answers {
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 16px;
    }
    .answer {
      min-height: 110px;
      border-radius: 28px;
      border: 3px solid rgba(255,184,0,.48);
      background: linear-gradient(180deg, rgba(15,18,31,.98), rgba(4,5,12,.98));
      color:#fff;
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px 20px;
      font-size: clamp(20px, 2.6vw, 40px);
      font-weight: 900;
      cursor:pointer;
    }
    .answer.selected { box-shadow: 0 0 0 4px rgba(255,190,0,.24); transform: translateY(-1px); }
    .answer.correct { border-color: rgba(115, 255, 170, .88); box-shadow: 0 0 0 4px rgba(115,255,170,.16); }
    .answer.incorrect { opacity: .72; }
    .answer:disabled { opacity:.65; cursor:not-allowed; }
    .badge {
      width:66px; height:66px; border-radius:999px; display:grid; place-items:center;
      background: radial-gradient(circle at 35% 30%, #ffbe5c, #ff7a00 56%, #ac2f00 100%);
      border: 3px solid rgba(255,214,95,.88);
      flex: 0 0 auto;
    }
    .join-card { width:min(560px, 100%); background:#111b2b; border:1px solid #263a55; border-radius:16px; padding:20px; }
    input, button { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #355074; background:#0d1625; color:#fff; padding:12px; font:inherit; }
    button { cursor:pointer; background:#d98600; color:#111; font-weight:700; margin-top:10px; }
    .notice { margin-top:12px; color:#d7e4f5; }
    .hidden { display:none !important; }
    .result { margin-top:16px; padding:14px 16px; border-radius:16px; background:#11233b; }
    .category { text-transform: uppercase; letter-spacing: .08em; color:#ffe49b; font-size:14px; margin-bottom:10px; text-align:center; }
    @media (max-width: 780px) { .answers { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="joinCard" class="join-card hidden">
    <h2>Join Trivia Game</h2>
    <input id="playerNameInput" type="text" placeholder="Enter your player name" />
    <input id="pictureInput" type="text" placeholder="Optional picture URL" />
    <button id="joinBtn">Join game</button>
    <div id="joinNotice" class="notice"></div>
  </div>

  <div id="board" class="board hidden">
    <h1>Trivia Mode</h1>
    <div class="topbar">
      <div class="player-pill">
        <div class="avatar" id="avatarBox">P</div>
        <div>Player <strong id="playerNameLabel">Player</strong></div>
      </div>
      <div class="pill">Score <strong id="playerScore">0</strong></div>
      <div class="pill">State <strong id="gameState">idle</strong></div>
      <div class="pill">Time <strong id="timerText">--</strong></div>
    </div>
    <div id="questionCategory" class="category"></div>
    <div id="questionText" class="question">Waiting for the host…</div>
    <div id="revealBox" class="reveal hidden">
      <div class="reveal-title">Correct Answer</div>
      <div id="revealAnswer" class="reveal-answer"></div>
      <div id="revealExplanation" class="reveal-explanation"></div>
    </div>
    <div id="answers" class="answers"></div>
    <div id="resultBox" class="result hidden"></div>
  </div>

  <script>
    const stateUrl = '/api/trivia_game/state';
    const joinUrl = '/api/trivia_game/join';
    const submitUrl = '/api/trivia_game/submit_answer';
    const params = new URLSearchParams(location.search);
    let playerName = (params.get('name') || localStorage.getItem('trivia_game_player_name') || '').trim();
    let playerPicture = (params.get('picture') || localStorage.getItem('trivia_game_player_picture') || '').trim();
    let latestState = null;
    let timerLoop = null;
    let socket = null;

    function initials(name) {
      return (name || 'P').split(/\s+/).slice(0, 2).map((part) => (part[0] || '')).join('').toUpperCase() || 'P';
    }

    function renderAvatar(player) {
      const box = document.getElementById('avatarBox');
      const picture = (player?.picture || playerPicture || '').trim();
      if (picture) {
        box.innerHTML = `<img src="${picture}" alt="Player avatar">`;
      } else {
        box.textContent = initials(player?.name || playerName);
      }
    }

    function showJoin(message = '') {
      document.getElementById('joinCard').classList.remove('hidden');
      document.getElementById('board').classList.add('hidden');
      document.getElementById('joinNotice').textContent = message;
      document.getElementById('playerNameInput').value = playerName;
      document.getElementById('pictureInput').value = playerPicture;
    }

    function showBoard() {
      document.getElementById('joinCard').classList.add('hidden');
      document.getElementById('board').classList.remove('hidden');
      document.getElementById('playerNameLabel').textContent = playerName || 'Player';
    }

    async function fetchState() {
      const response = await fetch(stateUrl, { cache: 'no-store' });
      const payload = await response.json();
      render(payload.state);
    }

    async function joinGame() {
      const input = document.getElementById('playerNameInput');
      const pictureInput = document.getElementById('pictureInput');
      playerName = (input.value || '').trim();
      playerPicture = (pictureInput.value || '').trim();
      if (!playerName) {
        showJoin('Player name is required.');
        return;
      }
      const response = await fetch(joinUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: playerName, picture: playerPicture }),
      });
      if (!response.ok) {
        showJoin(await response.text() || 'Unable to join game.');
        return;
      }
      localStorage.setItem('trivia_game_player_name', playerName);
      localStorage.setItem('trivia_game_player_picture', playerPicture);
      const payload = await response.json();
      render(payload.state);
    }

    async function submitAnswer(choiceIndex) {
      const response = await fetch(submitUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ player_name: playerName, choice_index: choiceIndex }),
      });
      if (!response.ok) {
        return;
      }
      const payload = await response.json();
      render(payload.state);
    }

    function renderAnswers(state) {
      const answersEl = document.getElementById('answers');
      answersEl.innerHTML = '';
      const choices = Array.isArray(state.question?.choices) ? state.question.choices : [];
      const selected = state.current_answers?.[playerName];
      const allowSelect = state.state === 'submitting';
      const correctIndex = state.state === 'results' ? state.question?.correct_index : null;
      choices.forEach((choice, index) => {
        const button = document.createElement('button');
        button.className = 'answer';
        if (selected === index) button.classList.add('selected');
        if (correctIndex === index) button.classList.add('correct');
        if (state.state === 'results' && correctIndex !== null && selected === index && selected !== correctIndex) button.classList.add('incorrect');
        button.disabled = !allowSelect;
        const badge = ['A','B','C','D','E','F'][index] || String(index + 1);
        button.innerHTML = `<div class="badge">${badge}</div><div>${choice}</div>`;
        button.addEventListener('click', () => submitAnswer(index).catch(() => {}));
        answersEl.appendChild(button);
      });
    }

    function renderReveal(state) {
      const box = document.getElementById('revealBox');
      const answerEl = document.getElementById('revealAnswer');
      const explanationEl = document.getElementById('revealExplanation');
      const result = state.last_result || {};
      if (state.state !== 'results' || !result.correct_answer) {
        box.classList.add('hidden');
        answerEl.textContent = '';
        explanationEl.textContent = '';
        return;
      }
      box.classList.remove('hidden');
      answerEl.textContent = result.correct_answer || '';
      explanationEl.textContent = result.explanation || '';
    }

    function renderResult(state) {
      const box = document.getElementById('resultBox');
      const result = state.last_result || {};
      if (state.state !== 'results' || !result.correct_answer) {
        box.classList.add('hidden');
        box.textContent = '';
        return;
      }
      const winners = Array.isArray(result.correct_players) ? result.correct_players : [];
      const hold = result.hold_for_manual_next ? ' Waiting for host to continue.' : '';
      box.classList.remove('hidden');
      box.textContent = `${winners.length ? `Winners: ${winners.join(', ')}.` : 'Nobody got it right.'}${hold}`.trim();
    }

    function render(state) {
      latestState = state;
      if (!playerName) {
        showJoin();
        return;
      }
      const joined = Array.isArray(state.players) && state.players.some((player) => (player.name || '').trim() === playerName);
      if (!joined) {
        showJoin('Join the room to keep playing.');
        return;
      }
      showBoard();
      const me = state.players.find((player) => (player.name || '').trim() === playerName) || { score: 0, picture: '' };
      renderAvatar(me);
      document.getElementById('playerScore').textContent = String(me.score ?? 0);
      document.getElementById('gameState').textContent = state.state || 'idle';
      document.getElementById('questionText').textContent = state.question?.question || 'Waiting for the host…';
      document.getElementById('questionCategory').textContent = state.question?.category || '';
      renderAnswers(state);
      renderReveal(state);
      renderResult(state);
      updateTimer();
    }

    function updateTimer() {
      const timerText = document.getElementById('timerText');
      if (!latestState?.timer_ends_at) {
        timerText.textContent = latestState?.state === 'results'
          ? (latestState?.last_result?.hold_for_manual_next ? 'Host next' : '--')
          : '--';
        return;
      }
      const remaining = Math.max(0, Math.ceil(latestState.timer_ends_at - Date.now() / 1000));
      timerText.textContent = String(remaining);
    }

    function connectSocket() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      socket = new WebSocket(`${protocol}://${location.host}/api/trivia_game/ws`);
      socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.event === 'state') render(payload.state);
      };
      socket.onclose = () => window.setTimeout(connectSocket, 1500);
    }

    document.getElementById('joinBtn').addEventListener('click', () => joinGame().catch((err) => showJoin(err.message)));
    document.getElementById('playerNameInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') joinGame().catch((err) => showJoin(err.message)); });
    document.getElementById('pictureInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') joinGame().catch((err) => showJoin(err.message)); });

    fetchState().catch(() => showJoin('Unable to load room state.'));
    connectSocket();
    timerLoop = setInterval(updateTimer, 250);
  </script>
</body>
</html>
